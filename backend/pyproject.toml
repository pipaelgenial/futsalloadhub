[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]
ignore = [
    "E402",  # module-level imports not at top — some are lazy/conditional
    "E701",  # multiple statements on one line — used in compact dict-builder funcs
    "E501",  # line too long — handled by formatter
    "B008",  # function calls in default args (used by FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F841"]
